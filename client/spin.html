<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Wheel - Eid Salami</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Spin the Wheel 🎡</h1>
      <p class="subtitle">Try your luck for Eid Salami</p>

      <div class="wheel-wrapper">
        <div class="pointer"></div>

        <div class="wheel" id="wheel">
          <div class="segment">0.01</div>
          <div class="segment">0.10</div>
          <div class="segment">0.20</div>
          <div class="segment">0.29</div>
          <div class="segment">0.50</div>
          <div class="segment">1</div>
          <div class="segment">3</div>
          <div class="segment">5</div>
          <div class="segment">7</div>
          <div class="segment">10</div>
          <div class="segment">15</div>
          <div class="segment">17</div>
          <div class="segment">14</div>
          <div class="segment">4</div>
          <div class="segment">13</div>
          <div class="segment">12</div>
          <div class="segment">11</div>
          <div class="segment">19</div>
          <div class="segment">20</div>
        </div>
      </div>

      <button id="spinBtn">Spin</button>
      <p id="spinMessage"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
